<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Login</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
    }

    input {
      width: 100%;
      margin: 8px 0;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="box">
    <h2>Login</h2>

    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Log In</button>

    <div id="result"></div>
  </div>

  <!-- 
    =========================================
    🔐 Hidden Developer Note (for students)
    password = camp2026
    =========================================
  -->

  <script>
    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      const result = document.getElementById("result");

      if (data.success) {
        result.innerHTML = "<span style='color:#4ade80'>Access Granted</span>";
      } else {
        result.innerHTML = "<span class='error'>Access Denied</span>";
      }
    }
  </script>

</body>
</html>
