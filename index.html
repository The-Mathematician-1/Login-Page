<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .top-image {
      width: 200px;
      height: auto;
      margin-bottom: 20px;
      display: block;
    }

    .box {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 250px;
      text-align: center;
    }

    input {
      width: 100%;
      margin: 8px 0;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 8px;
      background: #22c55e;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .error {
      color: #f87171;
      margin-top: 10px;
    }

    .success {
      color: #4ade80;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <img src="fake-school-logo.png" alt="Fake University Logo" class="top-image">

  <div class="box">
    <h2>Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Log In</button>
    <div id="result"></div>
  </div>

  <!-- Developer note -->
  <!--
    🔐 Username = hacker1
    🔐 Password = enterhere
  -->

  <script>
    function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const result = document.getElementById("result");

      // Check credentials
      if(username === "hacker1" && password === "enterhere") {
        result.innerHTML = "<span class='success'>Access Granted</span>";

        // Redirect after 0.5 seconds
        setTimeout(() => {
          window.location.href = "https://the-mathematician-1.github.io/wvsu4hCTF/"; // If students correctly input credentials, then they can move to the next step of the challenge.
        }, 500);

      } else {
        result.innerHTML = "<span class='error'>Access Denied</span>";
      }
    }
  </script>

</body>
</html>
